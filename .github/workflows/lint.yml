name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            skills/**/*.md
            docs/**/*.md
            !docs/plans/**
            tests/**/*.md
            README.md

  consistency-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No hardcoded absolute paths
        run: |
          if grep -rn --exclude-dir=plans '/Users/' skills/ docs/ tests/ README.md 2>/dev/null; then
            echo "::error::Found hardcoded absolute paths"
            exit 1
          fi

      - name: Schema field naming consistency
        run: |
          if grep -rn 'canon_status:' skills/ tests/ 2>/dev/null; then
            echo "::error::Found 'canon_status:' — use 'source_confidence:' instead"
            exit 1
          fi

      - name: Relative path validation
        run: |
          errors=0
          while IFS= read -r file; do
            dir=$(dirname "$file")
            grep -oP '`(\.\./[^`]+\.md)`' "$file" | tr -d '`' | while read -r ref; do
              target="$dir/$ref"
              if [ ! -f "$target" ]; then
                echo "::error file=$file::Broken relative path: $ref (resolved to $target)"
                errors=$((errors + 1))
              fi
            done
          done < <(find skills/ docs/ tests/ -name '*.md' -not -path '*/personal/*')
          if [ "$errors" -gt 0 ]; then
            exit 1
          fi

  schema-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate campaign entity schemas
        run: python scripts/validate_schema.py tests/benchmark-campaign
